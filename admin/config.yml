backend:
  name: git-gateway
  branch: main

media_folder: images/uploads
public_folder: /images/uploads

collections:

  - name: "contact"
    label: "Contact Info"
    files:
      - name: "contact"
        label: "Phone, Email & Hours"
        file: "_data/contact.json"
        fields:
          - { label: "Phone (display)", name: "phone_display", widget: "string", hint: "How it appears on the site, e.g. 855-99-UPGRADE" }
          - { label: "Phone (digits only, for tel: link)", name: "phone_tel", widget: "string", hint: "Digits only, no dashes or spaces, e.g. 8559987472" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Business Hours", name: "hours", widget: "string", hint: "e.g. Mon–Fri 8am–6pm · Sat by appointment" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "_data/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Customer Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Clarkston, MI", required: false }
      - { label: "Review", name: "quote", widget: "text" }
      - { label: "Star Rating", name: "stars", widget: "number", default: 5, value_type: "int", min: 1, max: 5 }
